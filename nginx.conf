# ============================================================
# nginx.conf — citas-gestion-zonasurtech
#
# Instalar en la VM:
#   sudo cp nginx.conf /etc/nginx/conf.d/zonasurtech.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Dominios cubiertos:
#   zonasurtech.online        → Landing pública
#   admin.zonasurtech.online  → Panel SUPERADMIN
#   cita.zonasurtech.online   → Panel Tenant (citas)
#   citas.zonasurtech.online  → Alias del panel Tenant
#
# Arquitectura:
#   Internet → Nginx (443 SSL) → localhost:3000 (Docker, Next.js)
#   Nginx inyecta X-Forwarded-Host=$host para que proxy.ts
#   identifique el subdominio y enrute al área correcta.
# ============================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream nextjs_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── HTTP → HTTPS Redirect ─────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name zonasurtech.online admin.zonasurtech.online cita.zonasurtech.online citas.zonasurtech.online;

    # Certbot ACME challenge (para emitir/renovar certificados SSL)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Forzar HTTPS en todo lo demás
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — Servidor Principal ────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name zonasurtech.online admin.zonasurtech.online cita.zonasurtech.online citas.zonasurtech.online;

    # Certificados SSL emitidos por Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/zonasurtech.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zonasurtech.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # HSTS — fuerza HTTPS por 1 año en el browser
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/xml+rss application/atom+xml image/svg+xml;

    # ── Assets estáticos de Next.js (caché agresivo) ──
    location ^~ /_next/static/ {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Immutable: el hash en el nombre del archivo garantiza unicidad
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Archivos estáticos públicos (imágenes, fuentes, etc.) ──
    location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|svg|ico|webp|avif|woff2?|ttf|eot)$ {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Tráfico general → Next.js ──────────────────────────
    location / {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;

        # WebSocket support (Next.js HMR / futuras features)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # CRÍTICO: $host permite que proxy.ts identifique el subdominio
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_cache_bypass    $http_upgrade;
    }
}
